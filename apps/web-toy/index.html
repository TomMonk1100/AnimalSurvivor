<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="animal-survivor-build-id" content="dev" />
    <title>Animal Survivor — Wildguard</title>
    <style>
      :root {
        color-scheme: dark;
        --palette-primary: #254f3d;
        --palette-accent: #8bd8bb;
        --palette-glow: #c9f26b;
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-right: env(safe-area-inset-right, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-left: env(safe-area-inset-left, 0px);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #132116;
        color: #e1ead8;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      /* The single game input surface. Only gestures here are prevented. */
      #game-surface {
        position: absolute;
        inset: 0;
        touch-action: none;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: absolute;
        top: calc(8px + var(--safe-area-top));
        left: calc(8px + var(--safe-area-left));
        padding: 8px 10px;
        background: rgba(10, 14, 20, 0.72);
        border: 1px solid #2a3442;
        border-radius: 6px;
        white-space: pre;
        pointer-events: none;
        user-select: none;
        max-width: 46vw;
      }
      #player-health {
        position: absolute;
        z-index: 3;
        top: calc(78px + var(--safe-area-top));
        left: calc(8px + var(--safe-area-left));
        width: min(240px, 46vw);
        box-sizing: border-box;
        padding: 6px 8px;
        color: #f4fff0;
        background: rgba(10, 28, 16, 0.82);
        border: 1px solid #78c88b;
        border-radius: 7px;
        box-shadow: 0 5px 16px rgba(0, 0, 0, 0.24);
        font: 12px/1.2 system-ui, sans-serif;
        pointer-events: none;
        user-select: none;
      }
      #player-health[hidden] { display: none; }
      #player-health header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      #player-health strong { font-size: 12px; }
      #player-health span { color: #d8f3d9; font-variant-numeric: tabular-nums; }
      #player-health-bar {
        height: 8px;
        margin-top: 5px;
        overflow: hidden;
        background: rgba(5, 12, 7, 0.82);
        border: 1px solid rgba(190, 245, 190, 0.45);
        border-radius: 999px;
      }
      #player-health-fill {
        width: 100%;
        height: 100%;
        transform: scaleX(1);
        transform-origin: left center;
        background: linear-gradient(90deg, #45d477, #c9f26b);
        transition: transform 120ms linear, background 120ms linear;
      }
      #adaptations {
        position: absolute;
        z-index: 2;
        right: calc(12px + var(--safe-area-right));
        bottom: calc(12px + var(--safe-area-bottom));
        display: grid;
        gap: 6px;
        width: min(264px, calc(100vw - 32px));
        pointer-events: none;
        user-select: none;
      }
      #adaptations[hidden] {
        display: none;
      }
      #adaptations .adaptations-title {
        color: #dbeeff;
        font: 700 12px/1.2 system-ui, sans-serif;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      #adaptations .adaptation-card {
        padding: 8px 9px;
        border: 1px solid #354963;
        border-left: 3px solid #79c7ec;
        border-radius: 6px;
        background: rgba(10, 14, 20, 0.78);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
        font: 12px/1.3 system-ui, sans-serif;
      }
      #adaptations .adaptation-card[data-stage="Mythic"] {
        border-left-color: #e383ff;
        background: rgba(45, 22, 59, 0.82);
      }
      #adaptations .adaptation-card strong,
      #adaptations .adaptation-card span,
      #adaptations .adaptation-card small {
        display: block;
      }
      #adaptations .adaptation-card strong { color: #eef7ff; font-size: 13px; }
      #adaptations .adaptation-card span { margin-top: 2px; color: #c5d6e6; }
      #adaptations .adaptation-card small { margin-top: 4px; color: #83b8df; font-weight: 600; }
      #controls {
        position: absolute;
        top: calc(8px + var(--safe-area-top));
        right: calc(8px + var(--safe-area-right));
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
        max-width: 46vw;
      }
      #controls button {
        min-height: 44px;
        font: inherit;
        color: #d7e0ea;
        background: #1a2230;
        border: 1px solid #33415a;
        border-radius: 5px;
        padding: 6px 9px;
        cursor: pointer;
      }
      #controls button:active {
        background: #263248;
      }
      #controls button:focus-visible {
        outline: 2px solid #d7edff;
        outline-offset: 2px;
        background: #35527a;
      }
      #controls .sound-status {
        flex-basis: 100%;
        color: #ffd3ad;
        font: 600 11px/1.3 system-ui, sans-serif;
        text-align: right;
      }
      #controls #input-mode-status {
        flex-basis: 100%;
        color: #9fc5d8;
        font: 600 10px/1.3 system-ui, sans-serif;
        text-align: right;
      }
      #run-intro .profile-summary {
        display: grid;
        grid-template-columns: 1fr;
        gap: 3px;
        width: min(320px, 100%);
        margin: 15px auto 0;
        padding: 7px 8px;
        color: #dceefd;
        background: rgba(17, 35, 51, 0.88);
        border: 1px solid var(--palette-accent);
        border-radius: 6px;
        font: 11px/1.3 system-ui, sans-serif;
        text-align: left;
      }
      #build-identity {
        margin: 12px 0 0;
        color: #9eb7c9;
        font: 10px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

      #run-intro .profile-summary strong { color: #a8d9f3; }
      #run-intro .profile-summary span { color: #c8d9e7; }

        color: #e9f7ff;
        background: #254967;

      #run-intro .profile-summary button:disabled {
        cursor: not-allowed;

      }
      #run-intro .permanent-shop {

        gap: 6px;
        margin-top: 4px;
      }
      #run-intro .permanent-shop .shop-card {
        display: grid;
        gap: 3px;
        padding: 6px 7px;
        background: rgba(12, 26, 39, 0.55);
        border: 1px solid rgba(107, 168, 201, 0.36);
        border-radius: 4px;
      }
      #run-intro .permanent-shop .shop-card-head {

      #run-intro .permanent-shop .shop-card-head strong { font-size: 11px; }

      #run-intro .permanent-shop .shop-card-desc {

      }
      #run-intro .permanent-shop .shop-card-effect {
        display: block;

        font-size: 10px;
        font-weight: 700;

      #run-intro .permanent-shop .shop-card-buy {
        width: 100%;
        min-height: 30px;
        margin-top: 2px;
        padding: 4px 6px;
        color: #e9f7ff;
        background: #254967;

        border-radius: 4px;
        font-size: 10px;
      }
      #run-intro .permanent-shop .shop-card-buy:disabled {
        cursor: not-allowed;
        opacity: 0.56;
      }
      #run-intro .accessibility-settings {
        margin-top: 2px;
      }
      #run-intro .credits-notices {
        margin-top: 2px;
      }
      #run-intro .palette-settings {
        margin-top: 2px;
      }
      #run-intro .palette-settings details {
        display: grid;
        gap: 5px;
      }
      #run-intro .palette-settings summary {
        color: #dff4ff;
        cursor: pointer;
        font-weight: 700;
      }
      #run-intro .palette-settings-hint {
        color: #8fb4ca;
        font-size: 10px;
      }
      #run-intro .palette-settings select {
        width: 100%;
        min-height: 28px;
        padding: 4px 6px;
        color: #e9f7ff;
        background: var(--palette-primary);
        border: 1px solid var(--palette-accent);
        border-radius: 4px;
        font: 11px system-ui, sans-serif;
      }
      #run-intro .credits-notices details {
        display: grid;
        gap: 4px;
      }
      #run-intro .credits-notices summary {
        color: #dff4ff;
        cursor: pointer;
        font-weight: 700;
      }
      #run-intro .credits-notices span,
      #run-intro .credits-notices small {
        color: #a9c6d7;

      }
      #run-intro .accessibility-settings details {
        display: grid;
        gap: 5px;
      }
      #run-intro .accessibility-settings summary {
        color: #dff4ff;
        cursor: pointer;
        font-weight: 700;
      }
      #run-intro .accessibility-settings-hint {
        color: #8fb4ca;
        font-size: 10px;
      }
      #run-intro .accessibility-setting {
        display: flex;

      #run-intro .accessibility-setting input {

      #run-intro .accessibility-setting.keyboard-binding input[type="text"] {
        width: 34px;

      #run-intro .accessibility-setting small {
        margin-top: 2px;

      #run-intro .accessibility-setting select {

        border-radius: 4px;

      }
      #run-intro .accessibility-settings details > button {
        min-height: 26px;
        margin-top: 0;
        padding: 4px 6px;
        color: #dff4ff;
        background: #20384a;
        border-color: #3b6079;

      }
      #run-intro .field-guide {
        display: grid;
        gap: 5px;
        margin-top: 3px;
      }
      #run-intro .field-guide > button {
        min-height: 30px;
        margin-top: 2px;
        color: #dff4ff;
        background: var(--palette-primary);

      }
      #run-intro .field-guide-panel {
        display: grid;

      #run-intro .field-guide-panel[hidden] { display: none; }
      #run-intro .field-guide-actions {

      #run-intro .field-guide-portrait {

        border-radius: 5px;
      }
      #run-intro .field-guide-portrait-image {
        width: 52px;
        height: 52px;
        flex: 0 0 52px;
        object-fit: cover;
        border: 1px solid rgba(224, 242, 255, 0.42);
        border-radius: 4px;
        background: #18293a;
      }
      #run-intro .field-guide-portrait strong {
        display: grid;
        width: 26px;
        height: 26px;
        place-items: center;
        color: #13202c;
        background: var(--portrait-accent);
        border-radius: 50%;
        font-size: 13px;
      }
      #run-intro .field-guide-portrait.field-guide-portrait-fallback {
        min-height: 34px;
      }
      #run-intro .field-guide-portrait span {
        color: #c8d9e7;
        font-size: 10px;
      }
      #run-intro .field-guide-entry[data-outcome="defeat"] { border-left-color: #c98370; }
      #run-intro .field-guide-entry strong { color: #d9f1ff; }
      #run-intro .field-guide-entry span { color: #c8d9e7; }
      #run-intro .field-guide-entry small,
      #run-intro .field-guide-empty { color: #8fb4ca; }
      #run-intro .field-guide-entry > button {

        padding: 3px 6px;
        color: #dff4ff;
        background: #20384a;

      }
      #run-intro .field-guide-evolution {
        display: grid;
        gap: 3px;
        margin-top: 2px;
        padding: 4px 5px;
        color: #a9c6d7;

        border: 1px solid #304c61;
        border-radius: 4px;
        font-size: 10px;
      }
      #run-intro .field-guide-evolution summary {
        color: #d7ecf8;
        cursor: pointer;
        font-weight: 700;
      }
      #run-intro .field-guide-challenges {
        display: grid;
        gap: 4px;
        margin-top: 2px;
        padding: 5px 6px;
        background: rgba(14, 25, 37, 0.72);
        border: 1px solid rgba(107, 168, 201, 0.32);
      }
      #run-intro .field-guide-recipes {
        display: grid;
        gap: 4px;
        padding: 5px 6px;
        background: rgba(14, 25, 37, 0.72);
        border: 1px solid rgba(241, 194, 125, 0.34);

      #run-intro .field-guide-recipes summary {

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
      html[data-reduced-motion="true"] *,
      html[data-reduced-motion="true"] *::before,
      html[data-reduced-motion="true"] *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;

        color: #fff9df;
        background:
          linear-gradient(135deg, rgba(27, 68, 42, 0.98), rgba(15, 42, 27, 0.98)),
          repeating-linear-gradient(0deg, rgba(255, 235, 166, 0.04) 0 1px, transparent 1px 5px);
        border: 1px solid rgba(232, 190, 98, 0.86);
        border-radius: 2px;
        box-shadow: 0 28px 80px rgba(3, 15, 8, 0.64), inset 0 0 0 4px rgba(255, 239, 182, 0.08);
      }
      #upgrade-choices h2,
      #upgrade-choices .upgrade-shortcuts {
        grid-column: 1 / -1;
      }
      #upgrade-choices .upgrade-fusion-actions {
        display: grid;
        grid-column: 1 / -1;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 2px;
        padding-top: 14px;
        border-top: 1px solid rgba(232, 190, 98, 0.48);
      }
      #upgrade-choices .upgrade-fusion-actions h3,
      #upgrade-choices .upgrade-fusion-actions .upgrade-shortcuts {
        grid-column: 1 / -1;
      }
      #upgrade-choices .upgrade-fusion-actions h3 {
        margin: 0;
        color: #f5d684;
        font: 700 18px/1 Georgia, "Iowan Old Style", serif;
      }
      #upgrade-choices .upgrade-fusion-actions button { min-height: 132px; }
      #upgrade-choices h2 {
        margin: 0;
        color: #fff1c1;
        font: 700 30px/1 Georgia, "Iowan Old Style", serif;
        letter-spacing: -0.035em;
      }
      #upgrade-choices h2::before,
      #upgrade-choices h2::after {
        margin: 0 10px;
        color: #e5b757;
        content: '✦';
        font-size: 16px;
        vertical-align: 3px;
      }
      #upgrade-choices .upgrade-shortcuts {
        margin: -3px 0 4px;
        color: #d9e9bb;
        font-size: 11px;
      }
      #upgrade-choices button {
        position: relative;
        display: flex;
        min-height: 194px;
        margin: 0;
        padding: 17px 15px 14px;
        overflow: hidden;
        flex-direction: column;
        justify-content: flex-start;
        color: #fff8df;
        text-align: left;
        background:
          linear-gradient(153deg, rgba(77, 129, 72, 0.98), rgba(41, 88, 51, 0.98) 64%, rgba(24, 57, 36, 0.98)),
          #254f32;
        border: 1px solid rgba(225, 185, 100, 0.74);
        border-left: 4px solid var(--brass);
        border-radius: 1px;
        box-shadow: 0 8px 16px rgba(2, 18, 9, 0.28), inset 0 1px rgba(255, 242, 190, 0.17);
        transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
      }
      #upgrade-choices button::after {
        position: absolute;
        top: -31px;
        right: -31px;
        width: 90px;
        height: 90px;
        content: '';
        opacity: 0.12;
        background: #ffe9a4;
        clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
      }
      #upgrade-choices button:hover {
        z-index: 1;
        transform: translateY(-4px);
        filter: brightness(1.1) saturate(1.06);
        box-shadow: 0 15px 24px rgba(2, 18, 9, 0.36), inset 0 1px rgba(255, 242, 190, 0.22);
      }
      #upgrade-choices button strong {
        position: relative;
        color: #fff2c1;
        font-size: 15px;
        line-height: 1.23;
      }
      #upgrade-choices button small {
        position: relative;
        margin-top: 9px;
        color: #f1d482;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      #upgrade-choices button span {
        position: relative;
        margin-top: 8px;
        color: #e4f0d5;
        font-size: 12px;
        line-height: 1.45;
      }
      #upgrade-choices button em {
        position: relative;
        margin-top: auto;
        padding-top: 9px;
        color: #f5d684;
        font-size: 11px;
        line-height: 1.35;
      }
      #upgrade-choices button:focus-visible {
        z-index: 2;
        outline: 3px solid #fff0a4;
        outline-offset: 3px;
        background: linear-gradient(153deg, #5d914e, #356d40 64%, #244e31);
      }

      #pause-notice,
      #run-outcome,
      #director-notice {
        border-radius: 2px;
        box-shadow: 0 25px 70px rgba(3, 15, 8, 0.55), inset 0 0 0 3px rgba(255, 238, 177, 0.07);
      }
      #pause-notice {
        width: min(440px, calc(100vw - 36px));
        padding: 23px;
        background:
          linear-gradient(135deg, rgba(35, 76, 47, 0.98), rgba(17, 46, 28, 0.98)),
          #143a26;
      }
      #pause-notice > strong:first-child {
        color: #fff0bd;
        font: 700 28px/1 Georgia, "Iowan Old Style", serif;
        letter-spacing: -0.03em;
      }
      #pause-notice > strong:first-child::before,
      #pause-notice > strong:first-child::after {
        margin: 0 9px;
        color: #dfb353;
        content: '✦';
        font-size: 14px;
        vertical-align: 3px;
      }
      #pause-notice > span { color: #d7e9c6; }
      #pause-notice .pause-upgrades-title {
        padding-top: 12px;
        border-top: 1px solid rgba(238, 198, 109, 0.25);
        color: #f4d781;
      }
      #pause-notice .pause-upgrade-card {
        padding: 10px 11px;
        background: rgba(83, 126, 69, 0.48);
        border: 1px solid rgba(228, 187, 102, 0.4);
        border-left: 3px solid #dcae4a;
        border-radius: 1px;
      }
      #pause-notice .pause-upgrade-card[data-kind="universal"] {
        background: rgba(72, 127, 91, 0.5);
        border-left-color: #83cdaa;
      }

      #run-outcome {
        width: min(430px, calc(100vw - 36px));
        padding: 29px 29px 26px;
        color: #fff8df;
        background:
          radial-gradient(ellipse at 50% 0%, rgba(239, 198, 101, 0.2), transparent 43%),
          linear-gradient(135deg, rgba(37, 83, 50, 0.99), rgba(16, 47, 29, 0.99));
        border: 1px solid rgba(235, 196, 105, 0.82);
      }
      #run-outcome::before {
        display: block;
        margin-bottom: 10px;
        color: #f3ce71;
        content: '✦';
        font-size: 24px;
      }
      #run-outcome > strong {
        color: #fff0be;
        font: 700 31px/1.02 Georgia, "Iowan Old Style", serif;
        letter-spacing: -0.04em;
      }
      #run-outcome > span { color: #dcebc8; }
      #run-outcome .outcome-essence {
        margin-top: 10px;
        color: #f3d47c;
        font-size: 14px;
      }
      #run-outcome button {
        width: 100%;
        min-height: 51px;
        margin-top: 20px;
        color: #fff6da;
        background: linear-gradient(135deg, #4b8147, #285737);
        border: 1px solid #e5c26e;
        border-radius: 1px;
        box-shadow: 0 4px 0 #183b26, inset 0 1px rgba(255, 246, 198, 0.35);
        font: 800 13px/1 ui-rounded, "Avenir Next", system-ui, sans-serif;
        letter-spacing: 0.09em;
        text-transform: uppercase;
      }
      /* Replay payloads are support tooling, not a player-facing reward. */
      #run-outcome button + button { display: none; }
      #run-outcome[data-outcome="defeat"] {
        background:
          radial-gradient(ellipse at 50% 0%, rgba(226, 152, 86, 0.16), transparent 43%),
          linear-gradient(135deg, rgba(109, 48, 34, 0.99), rgba(69, 27, 25, 0.99));
        border-color: #dda06c;
      }
      #run-outcome[data-outcome="defeat"]::before { color: #efb06d; content: '◆'; }
      #run-outcome[data-outcome="defeat"] button {
        background: linear-gradient(135deg, #a5523e, #71342d);
        border-color: #e7a36f;
        box-shadow: 0 4px 0 #4a241f, inset 0 1px rgba(255, 231, 191, 0.25);
      }
      #run-outcome button:focus-visible { outline: 3px solid #fff0ad; outline-offset: 4px; }
      #director-notice {
        border-color: rgba(236, 194, 103, 0.77);
        background: linear-gradient(135deg, rgba(33, 73, 47, 0.96), rgba(17, 47, 29, 0.96));
      }

      /* Keep query-string diagnostics useful to engineers without letting their
         controls read as product UI during a normal player-facing capture. */
      #controls:has(input) > input,
      #controls:has(input) > button:not(:first-child) { display: none; }
      #controls #input-mode-status {
        padding: 4px 7px;
        color: #e7d48a;
        background: rgba(17, 52, 33, 0.62);
        border: 1px solid rgba(226, 186, 97, 0.28);
        border-radius: 1px;
        font-size: 9px;
        letter-spacing: 0.025em;
      }

      /* A player HUD is a compact field instrument, not a preformatted debug
         log. `createHud` builds these nodes once and only updates copy/bars. */
      #hud[data-hud-mode="player"] {
        width: min(318px, calc(100vw - 34px));
        min-width: 0;
        padding: 0;
        overflow: hidden;
        color: #fff5d4;
        white-space: normal;
        background: transparent;
        border: 0;
        border-left: 0;
        border-radius: 0;
        box-shadow: none;
        font-family: ui-rounded, "Avenir Next", "Trebuchet MS", system-ui, sans-serif;
        letter-spacing: normal;
      }
      #hud[data-hud-mode="diagnostics"] {
        white-space: pre;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      /* Debug-only deterministic combat proof. It lives outside the normal
         player HUD so it is available to developers without leaking prototype
         telemetry into a player-facing run. */
      .attack-damage-lab {
        position: absolute;
        z-index: 9;
        top: calc(168px + var(--safe-area-top));
        right: calc(10px + var(--safe-area-right));
        width: min(650px, calc(100vw - 28px));
        max-height: min(520px, calc(100dvh - 190px));
        box-sizing: border-box;
        overflow: auto;
        padding: 9px 10px 10px;
        color: #eaf6dd;
        background: rgba(7, 21, 13, 0.95);
        border: 1px solid rgba(230, 194, 104, 0.72);
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        font: 11px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        pointer-events: auto;
      }
      .attack-damage-lab summary {
        cursor: pointer;
        color: #fff0b3;
        font-weight: 800;
      }
      .attack-damage-lab > p { margin: 7px 0; color: #bdd8b8; }
      .attack-damage-lab table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
      .attack-damage-lab th,
      .attack-damage-lab td { padding: 5px 6px; border-top: 1px solid rgba(214, 239, 188, 0.14); text-align: right; white-space: nowrap; }
      .attack-damage-lab thead th { color: #d8e7a0; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
      .attack-damage-lab th[scope="row"] { min-width: 150px; text-align: left; white-space: normal; }
      .attack-damage-lab th[scope="row"] strong,
      .attack-damage-lab th[scope="row"] small { display: block; }
      .attack-damage-lab th[scope="row"] strong { color: #fff8d5; }
      .attack-damage-lab th[scope="row"] small { margin-top: 1px; color: #9bc9ac; font-weight: 500; }
      .attack-damage-lab tbody tr[data-status="confirmed"],
      .attack-damage-lab tbody tr[data-status="damage-confirmed"] { background: rgba(74, 159, 83, 0.12); }
      .attack-damage-lab tbody tr[data-status="not-confirmed"] { background: rgba(185, 68, 54, 0.2); }
      .attack-damage-lab-note { font-weight: 700; }
      .hud-shell {
        display: grid;
        gap: 7px;
        padding: 12px 13px 11px;
        background:
          linear-gradient(135deg, rgba(16, 54, 33, 0.95), rgba(9, 34, 23, 0.91)),
          repeating-linear-gradient(0deg, rgba(255, 239, 183, 0.045) 0 1px, transparent 1px 5px);
        border: 1px solid rgba(237, 196, 106, 0.7);
        border-left: 4px solid #d9a13a;
        border-radius: 12px 5px 12px 5px;
        box-shadow: 0 12px 27px rgba(4, 22, 12, 0.42), inset 0 1px rgba(255, 244, 204, 0.12);
      }
      .hud-topline,
      .hud-bar-label {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }
      .hud-hero {
        color: #fff0ba;
        font: 800 15px/1 Georgia, "Iowan Old Style", serif;
        letter-spacing: 0.055em;
      }
      .hud-level {
        padding: 3px 6px;
        color: #183825;
        background: #e4c765;
        border-radius: 2px;
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0.09em;
      }
      .hud-bar-label { margin-top: 1px; color: #bed5aa; font-size: 9px; font-weight: 800; letter-spacing: 0.11em; }
      .hud-bar-label strong { color: #fff5d8; font-size: 11px; letter-spacing: 0; }
      .hud-xp-label { margin-top: 2px; }
      .hud-bar {
        height: 8px;
        overflow: hidden;
        background: rgba(5, 21, 12, 0.8);
        border: 1px solid rgba(255, 240, 190, 0.3);
        border-radius: 999px;
      }
      .hud-bar-fill {
        width: 100%;
        height: 100%;
        transform: scaleX(0);
        transform-origin: left center;
        transition: transform 160ms ease-out;
      }
      .hud-hp-fill { background: linear-gradient(90deg, #4ec271, #dfe273); }
      .hud-xp-fill { background: linear-gradient(90deg, #4bb7aa, #92e8da); }
      .hud-mission {
        display: grid;
        gap: 1px;
        margin-top: 3px;
        padding-top: 7px;
        border-top: 1px solid rgba(242, 207, 126, 0.22);
      }
      .hud-phase { color: #edce78; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
      .hud-objective { color: #e8efd8; font-size: 11px; line-height: 1.25; }
      .hud-hint { color: rgba(209, 229, 182, 0.78); font-size: 9px; line-height: 1.3; }
      /* Health is represented inside the semantic HUD; the legacy second card
         would otherwise duplicate status and add prototype clutter. */
      #player-health { display: none !important; }
      #controls > button:not(:first-of-type),
      #controls #input-mode-status { display: none; }
      #controls > button:first-of-type {
        min-width: 76px;
        min-height: 45px;
        font-size: 11px;
      }

      @media (max-width: 740px) {
        #run-intro {
          justify-items: center;
          padding: calc(18px + var(--safe-area-top)) calc(18px + var(--safe-area-right)) calc(18px + var(--safe-area-bottom)) calc(18px + var(--safe-area-left));
          background:
            linear-gradient(180deg, rgba(11, 36, 21, 0.74), rgba(14, 37, 23, 0.88)),
            var(--wildguard-keyart) 61% center / cover no-repeat,
            #173b29;
        }
        #run-intro::after { inset: 10px; }
        #run-intro .run-intro-card {
          width: min(560px, calc(100vw - 28px));
          max-height: calc(100dvh - var(--safe-area-top) - var(--safe-area-bottom) - 28px);
          padding: 24px 20px;
        }
        #run-intro h1 { font-size: clamp(32px, 9vw, 43px); }
        #run-intro .hero-selection-choices button { min-height: 192px; }
        #upgrade-choices {
          width: min(540px, calc(100vw - 28px));
          grid-template-columns: 1fr;
          gap: 8px;
          max-height: calc(100dvh - 28px);
          overflow-y: auto;
          padding: 20px;
        }
        #upgrade-choices button { min-height: 0; }
        #upgrade-choices button span { font-size: 11px; }
        #upgrade-choices .upgrade-fusion-actions { grid-template-columns: 1fr; }
        #hud[data-hud-mode="player"] { width: min(294px, calc(100vw - 24px)); }
      }
      @media (max-width: 440px) {
        #run-intro .run-intro-card { padding: 22px 16px; }
        #run-intro .hero-selection-choices { gap: 6px; }
        #run-intro .hero-selection-choices button { min-height: 178px; padding: 6px; }
        #run-intro .hero-selection-portrait-frame { height: 58px; margin-bottom: 6px; }
        #run-intro .hero-selection-choices button strong { font-size: 11px; }
        #run-intro .hero-selection-choices button span { font-size: 9px; }
        #run-intro .profile-summary { grid-template-columns: 1fr; }
        #run-intro .permanent-shop { grid-template-columns: 1fr; }
        #run-intro #run-intro-start { min-height: 54px; font-size: 13px; }
        #pause-notice, #run-outcome { width: min(390px, calc(100vw - 28px)); padding: 22px 19px; }
      }
      #run-intro .hero-selection-portrait-frame {
        position: relative;
        z-index: 1;
        display: block;
        width: 100%;
        height: 72px;
        margin: 0 0 8px;
        overflow: hidden;
        border: 1px solid rgba(255, 239, 184, 0.64);
        border-radius: 1px;
        background: #284c34;
        box-shadow: 0 3px 8px rgba(6, 24, 12, 0.28);
      }
      #run-intro .hero-selection-portrait-fallback {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #fff6ce;
        background:
          radial-gradient(circle at 50% 42%, var(--portrait-accent) 0 18%, transparent 19%),
          linear-gradient(145deg, #3d754a, #193d2b);
        font: 800 30px/1 Georgia, "Iowan Old Style", serif;
        text-shadow: 0 2px 5px rgba(7, 24, 13, 0.58);
        transition: opacity 120ms ease;
      }
      #run-intro .hero-selection-portrait {
        position: absolute;
        z-index: 1;
        inset: 0;
        display: block;
        float: none;
        width: 100%;
        height: 100%;
        margin: 0;
        opacity: 0;
        object-fit: cover;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        transition: opacity 120ms ease;
      }
      #run-intro .hero-selection-portrait-frame[data-state="loaded"] .hero-selection-portrait { opacity: 1; }
      #run-intro .hero-selection-portrait-frame[data-state="loaded"] .hero-selection-portrait-fallback { opacity: 0; }
      @media (max-width: 440px) {
        #run-intro .hero-selection-portrait-frame { height: 58px; margin-bottom: 6px; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-surface" tabindex="-1" aria-label="Game arena">
        <canvas id="game-canvas"></canvas>
        <div id="joystick"><span id="joystick-thumb" aria-hidden="true"></span></div>
      </div>
      <section id="hud" aria-label="Expedition status"></section>
      <section id="player-health" aria-label="Player health">
        <header><strong id="player-health-title">Health</strong><span id="player-health-text"></span></header>
        <div id="player-health-bar" role="progressbar" aria-labelledby="player-health-title" aria-valuemin="0" aria-valuemax="100">
          <div id="player-health-fill"></div>
        </div>
      </section>
      <aside id="adaptations" aria-label="Active adaptations" aria-live="polite" hidden></aside>
      <div id="controls">
        <span id="input-mode-status" role="status" aria-live="polite">Input: Keyboard · WASD / Arrow Keys</span>
      </div>
      <section id="pause-notice" aria-label="Paused run" hidden></section>
      <section id="upgrade-choices" aria-live="polite" aria-labelledby="upgrade-choices-heading" aria-describedby="upgrade-choices-shortcuts" hidden></section>
      <div id="director-notice" class="banner" role="status" aria-live="polite" hidden></div>
      <section id="boss-health" aria-label="Boss health" hidden>
        <div id="boss-health-content">
          <img id="boss-health-portrait" alt="" hidden />
          <div id="boss-health-details">
            <header><strong id="boss-health-title">The Final Threat</strong><span id="boss-health-text"></span></header>
            <div id="boss-health-bar" role="progressbar" aria-labelledby="boss-health-title" aria-valuemin="0" aria-valuemax="100">
              <div id="boss-health-fill"></div>
            </div>
          </div>
        </div>
      </section>
      <div id="run-outcome" class="banner" role="status" hidden></div>
      <div id="ctx-banner" class="banner">WebGL context lost — simulation paused, restoring…</div>
    </div>
    <section id="run-intro" role="dialog" aria-modal="true" aria-labelledby="run-intro-heading" aria-describedby="run-intro-objective run-intro-controls" hidden>
      <div class="run-intro-card">
        <p id="run-intro-eyebrow" class="run-intro-eyebrow"></p>
        <h1 id="run-intro-heading"></h1>
        <p id="run-intro-objective"></p>
        <p id="run-intro-controls"></p>
        <button id="run-intro-start" type="button"></button>
        <p id="build-identity" data-build-id="dev">Build identity loading…</p>
        <section id="run-intro-profile" aria-label="Between-run upgrades"></section>
        <label id="run-intro-sound" class="run-intro-sound">
          <input id="run-intro-sound-toggle" type="checkbox" aria-label="Sound effects" aria-describedby="run-intro-sound-help" />
          <span>Sound effects</span>
          <small id="run-intro-sound-help">On when a run starts. Change anytime.</small>
        </label>
        <p id="run-intro-sound-status" class="sound-status" role="status" hidden></p>
        <details id="run-intro-audio-mix" class="audio-mix-settings" hidden>
          <summary>Audio mix</summary>
          <label class="audio-mix-row"><span>Master</span><input id="audio-master-volume" type="range" min="0" max="1" step="0.05" aria-label="Master volume" /><output id="audio-master-volume-value">100%</output></label>
          <label class="audio-mix-row"><span>Music bed</span><input id="audio-music-volume" type="range" min="0" max="1" step="0.05" aria-label="Music bed volume" /><output id="audio-music-volume-value">12%</output></label>
          <label class="audio-mix-row"><span>Sound effects</span><input id="audio-sfx-volume" type="range" min="0" max="1" step="0.05" aria-label="Sound effects volume" /><output id="audio-sfx-volume-value">100%</output></label>
        </details>
      </div>
    </section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
