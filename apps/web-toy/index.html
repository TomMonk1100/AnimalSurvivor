<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>AnimalSurvivor — Web Toy (Gate 1)</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0e13;
        color: #d7e0ea;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      /* The single game input surface. Only gestures here are prevented. */
      #game-surface {
        position: absolute;
        inset: 0;
        touch-action: none;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: absolute;
        top: 8px;
        left: 8px;
        padding: 8px 10px;
        background: rgba(10, 14, 20, 0.72);
        border: 1px solid #2a3442;
        border-radius: 6px;
        white-space: pre;
        pointer-events: none;
        user-select: none;
        max-width: 46vw;
      }
      #adaptations {
        position: absolute;
        z-index: 2;
        right: 12px;
        bottom: 12px;
        display: grid;
        gap: 6px;
        width: min(264px, calc(100vw - 32px));
        pointer-events: none;
        user-select: none;
      }
      #adaptations[hidden] {
        display: none;
      }
      #adaptations .adaptations-title {
        color: #dbeeff;
        font: 700 12px/1.2 system-ui, sans-serif;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      #adaptations .adaptation-card {
        padding: 8px 9px;
        border: 1px solid #354963;
        border-left: 3px solid #79c7ec;
        border-radius: 6px;
        background: rgba(10, 14, 20, 0.78);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
        font: 12px/1.3 system-ui, sans-serif;
      }
      #adaptations .adaptation-card[data-stage="Mythic"] {
        border-left-color: #e383ff;
        background: rgba(45, 22, 59, 0.82);
      }
      #adaptations .adaptation-card strong,
      #adaptations .adaptation-card span,
      #adaptations .adaptation-card small {
        display: block;
      }
      #adaptations .adaptation-card strong { color: #eef7ff; font-size: 13px; }
      #adaptations .adaptation-card span { margin-top: 2px; color: #c5d6e6; }
      #adaptations .adaptation-card small { margin-top: 4px; color: #83b8df; font-weight: 600; }
      #controls {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
        max-width: 46vw;
      }
      #controls button {
        font: inherit;
        color: #d7e0ea;
        background: #1a2230;
        border: 1px solid #33415a;
        border-radius: 5px;
        padding: 6px 9px;
        cursor: pointer;
      }
      #controls button:active {
        background: #263248;
      }
      #joystick {
        position: absolute;
        left: 16px;
        bottom: 16px;
        width: 40%;
        height: 45%;
        touch-action: none;
        border: 1px dashed rgba(120, 150, 180, 0.28);
        border-radius: 50%;
        background: rgba(40, 60, 80, 0.08);
      }
      .banner {
        position: absolute;
        left: 50%;
        top: 12px;
        transform: translateX(-50%);
        background: rgba(120, 20, 20, 0.85);
        border: 1px solid #ff6b6b;
        border-radius: 6px;
        padding: 6px 12px;
        display: none;
      }
      #upgrade-choices {
        position: absolute;
        z-index: 4;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(560px, calc(100vw - 32px));
        padding: 18px;
        box-sizing: border-box;
        border: 1px solid #7789aa;
        border-radius: 12px;
        background: rgba(11, 16, 25, 0.96);
        box-shadow: 0 14px 50px rgba(0, 0, 0, 0.55);
      }
      #upgrade-choices[hidden] {
        display: none;
      }
      #upgrade-choices h2 {
        margin: 0 0 12px;
        text-align: center;
        font: 600 17px/1.3 system-ui, sans-serif;
      }
      #upgrade-choices button {
        display: block;
        width: 100%;
        margin-top: 8px;
        padding: 12px;
        color: #eef5ff;
        background: #26354d;
        border: 1px solid #57709a;
        border-radius: 8px;
        font: 600 14px/1.2 system-ui, sans-serif;
        cursor: pointer;
      }
      #upgrade-choices button strong,
      #upgrade-choices button small,
      #upgrade-choices button span {
        display: block;
      }
      #upgrade-choices button small {
        margin-top: 3px;
        color: #8db8e5;
        font-weight: 600;
      }
      #upgrade-choices button span {
        margin-top: 5px;
        color: #c3d1e4;
        font-weight: 400;
        line-height: 1.35;
      }
      #upgrade-choices button em {
        display: block;
        margin-top: 7px;
        color: #f0cd78;
        font-size: 12px;
        font-style: normal;
      }
      #run-outcome {
        top: 76px;
        font: 700 16px/1.3 system-ui, sans-serif;
        background: rgba(20, 70, 45, 0.92);
        border-color: #78d9a6;
      }
      #run-outcome[hidden] {
        display: none;
      }
      #run-outcome[data-outcome="defeat"] {
        background: rgba(111, 28, 28, 0.94);
        border-color: #ff7777;
      }
      #run-outcome strong, #run-outcome span { display: block; }
      #run-outcome span { margin-top: 3px; font-size: 13px; font-weight: 500; }
      #director-notice {
        top: 58px;
        min-width: min(360px, calc(100vw - 32px));
        text-align: center;
        background: rgba(25, 38, 58, 0.92);
        border-color: #7397c9;
        font: 13px/1.3 system-ui, sans-serif;
      }
      #director-notice[hidden] { display: none; }
      #director-notice strong, #director-notice span { display: block; }
      #director-notice strong { font-size: 16px; }
      #director-notice[data-tone="warning"] { background: rgba(104, 72, 14, 0.94); border-color: #f4c05d; }
      #director-notice[data-tone="danger"] { background: rgba(111, 28, 28, 0.94); border-color: #ff7777; }
      #trait-callout {
        position: absolute;
        z-index: 3;
        left: 50%;
        top: 108px;
        width: min(360px, calc(100vw - 32px));
        padding: 8px 12px;
        box-sizing: border-box;
        transform: translateX(-50%);
        color: #eaf6ff;
        text-align: center;
        background: rgba(18, 35, 50, 0.9);
        border: 1px solid #6db7e4;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.34);
        font: 13px/1.3 system-ui, sans-serif;
        pointer-events: none;
        user-select: none;
      }
      #trait-callout[hidden] { display: none; }
      #trait-callout strong, #trait-callout span { display: block; }
      #trait-callout strong { font-size: 14px; }
      #trait-callout span { margin-top: 2px; color: #c8e3f4; }
      #trait-callout[data-tone="gather"] { background: rgba(13, 57, 74, 0.92); border-color: #62cfe9; }
      #trait-callout[data-tone="knockback"] { background: rgba(91, 37, 16, 0.92); border-color: #ff9a58; }
      #trait-callout[data-tone="mythic"] { background: rgba(61, 29, 82, 0.93); border-color: #e390ff; }
      @media (max-width: 600px) {
        #hud {
          right: 8px;
          max-width: none;
          font-size: 10px;
          white-space: pre-wrap;
        }
        #controls {
          top: 118px;
          left: 8px;
          right: 8px;
          max-width: none;
          justify-content: flex-start;
        }
        #controls button {
          padding: 5px 7px;
        }
        #adaptations {
          right: 8px;
          bottom: 8px;
          width: min(236px, calc(100vw - 24px));
        }
        #adaptations .adaptation-card {
          padding: 6px 7px;
          font-size: 11px;
        }
        #trait-callout {
          top: 166px;
          font-size: 12px;
        }
        #joystick {
          width: 42vw;
          height: 42vw;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-surface">
        <canvas id="game-canvas"></canvas>
        <div id="joystick"></div>
      </div>
      <pre id="hud"></pre>
      <aside id="adaptations" aria-label="Active adaptations" aria-live="polite" hidden></aside>
      <div id="controls"></div>
      <section id="upgrade-choices" aria-live="polite" hidden></section>
      <div id="director-notice" class="banner" role="status" aria-live="polite" hidden></div>
      <div id="trait-callout" aria-hidden="true" hidden></div>
      <div id="run-outcome" class="banner" role="status" hidden></div>
      <div id="ctx-banner" class="banner">WebGL context lost — simulation paused, restoring…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
