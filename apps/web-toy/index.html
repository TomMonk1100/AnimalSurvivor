<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>AnimalSurvivor — Web Toy (Gate 1)</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0e13;
        color: #d7e0ea;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      /* The single game input surface. Only gestures here are prevented. */
      #game-surface {
        position: absolute;
        inset: 0;
        touch-action: none;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: absolute;
        top: 8px;
        left: 8px;
        padding: 8px 10px;
        background: rgba(10, 14, 20, 0.72);
        border: 1px solid #2a3442;
        border-radius: 6px;
        white-space: pre;
        pointer-events: none;
        user-select: none;
        max-width: 46vw;
      }
      #adaptations {
        position: absolute;
        z-index: 2;
        right: 12px;
        bottom: 12px;
        display: grid;
        gap: 6px;
        width: min(264px, calc(100vw - 32px));
        pointer-events: none;
        user-select: none;
      }
      #adaptations[hidden] {
        display: none;
      }
      #adaptations .adaptations-title {
        color: #dbeeff;
        font: 700 12px/1.2 system-ui, sans-serif;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      #adaptations .adaptation-card {
        padding: 8px 9px;
        border: 1px solid #354963;
        border-left: 3px solid #79c7ec;
        border-radius: 6px;
        background: rgba(10, 14, 20, 0.78);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
        font: 12px/1.3 system-ui, sans-serif;
      }
      #adaptations .adaptation-card[data-stage="Mythic"] {
        border-left-color: #e383ff;
        background: rgba(45, 22, 59, 0.82);
      }
      #adaptations .adaptation-card strong,
      #adaptations .adaptation-card span,
      #adaptations .adaptation-card small {
        display: block;
      }
      #adaptations .adaptation-card strong { color: #eef7ff; font-size: 13px; }
      #adaptations .adaptation-card span { margin-top: 2px; color: #c5d6e6; }
      #adaptations .adaptation-card small { margin-top: 4px; color: #83b8df; font-weight: 600; }
      #controls {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
        max-width: 46vw;
      }
      #controls button {
        min-height: 44px;
        font: inherit;
        color: #d7e0ea;
        background: #1a2230;
        border: 1px solid #33415a;
        border-radius: 5px;
        padding: 6px 9px;
        cursor: pointer;
      }
      #controls button:active {
        background: #263248;
      }
      #controls button:focus-visible {
        outline: 2px solid #d7edff;
        outline-offset: 2px;
        background: #35527a;
      }
      #controls .sound-status {
        flex-basis: 100%;
        color: #ffd3ad;
        font: 600 11px/1.3 system-ui, sans-serif;
        text-align: right;
      }
      #joystick {
        position: absolute;
        left: 16px;
        bottom: 16px;
        /* Desktop primarily uses keys; keep its touch fallback discoverable
           without letting an empty control zone dominate the arena. Narrow
           touch layouts below retain their larger 42vw target. */
        width: min(240px, 40vw);
        height: min(240px, 45vh);
        overflow: hidden;
        touch-action: none;
        border: 1px dashed rgba(120, 150, 180, 0.28);
        border-radius: 50%;
        background: rgba(40, 60, 80, 0.08);
      }
      #joystick::before {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(178, 214, 239, 0.42);
        content: 'DRAG\A TO MOVE';
        text-align: center;
        white-space: pre;
        font: 700 10px/1.35 system-ui, sans-serif;
        letter-spacing: 0.08em;
        pointer-events: none;
        user-select: none;
        transition: opacity 100ms ease;
      }
      #joystick[data-active="true"]::before { opacity: 0.2; }
      #joystick-thumb {
        position: absolute;
        top: var(--joystick-thumb-y, 50%);
        left: var(--joystick-thumb-x, 50%);
        width: 42px;
        height: 42px;
        box-sizing: border-box;
        border: 2px solid rgba(213, 240, 255, 0.92);
        border-radius: 50%;
        background: rgba(88, 172, 221, 0.42);
        box-shadow: 0 0 0 7px rgba(81, 157, 203, 0.14), 0 5px 16px rgba(0, 0, 0, 0.3);
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%);
        transition: opacity 90ms ease;
      }
      #joystick[data-active="true"] #joystick-thumb { opacity: 1; }
      #run-intro {
        position: fixed;
        z-index: 6;
        inset: 0;
        display: grid;
        place-items: center;
        box-sizing: border-box;
        padding: 16px;
        background: rgba(5, 9, 14, 0.8);
        backdrop-filter: blur(3px);
      }
      #run-intro[hidden] { display: none; }
      #run-intro .run-intro-card {
        width: min(450px, calc(100vw - 32px));
        box-sizing: border-box;
        padding: 22px;
        color: #edf7ff;
        text-align: center;
        background: rgba(16, 27, 42, 0.97);
        border: 1px solid #6c9ac2;
        border-radius: 14px;
        box-shadow: 0 18px 56px rgba(0, 0, 0, 0.58);
        font: 14px/1.45 system-ui, sans-serif;
      }
      #run-intro .run-intro-eyebrow {
        margin: 0 0 5px;
        color: #86cfee;
        font: 700 11px/1.2 system-ui, sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      #run-intro h1 {
        margin: 0;
        font: 700 25px/1.15 system-ui, sans-serif;
      }
      #run-intro p:not(.run-intro-eyebrow) { margin: 12px 0 0; }
      #run-intro #run-intro-controls { color: #b6d1e5; }
      #run-intro .run-intro-sound {
        display: grid;
        grid-template-columns: auto 1fr;
        column-gap: 9px;
        align-items: center;
        width: min(320px, 100%);
        min-height: 44px;
        margin: 15px auto 0;
        padding: 8px 10px;
        box-sizing: border-box;
        color: #d7e8f4;
        text-align: left;
        background: rgba(25, 42, 61, 0.72);
        border: 1px solid #486985;
        border-radius: 7px;
        cursor: pointer;
      }
      #run-intro .run-intro-sound input {
        grid-row: span 2;
        width: 18px;
        height: 18px;
        margin: 0;
        accent-color: #67c99d;
      }
      #run-intro .run-intro-sound span { font-weight: 700; }
      #run-intro .run-intro-sound small { color: #a9c3d7; font-size: 11px; }
      #run-intro .sound-status {
        min-height: 16px;
        margin: 8px 0 0;
        color: #ffd3ad;
        font: 600 12px/1.3 system-ui, sans-serif;
      }
      #run-intro button {
        min-height: 44px;
        margin-top: 18px;
        padding: 10px 18px;
        color: #effaff;
        background: #28634d;
        border: 1px solid #a5e9c6;
        border-radius: 7px;
        font: 700 14px/1 system-ui, sans-serif;
        cursor: pointer;
      }
      #run-intro button:focus-visible {
        outline: 3px solid #ffffff;
        outline-offset: 3px;
        background: #397b61;
      }
      .banner {
        position: absolute;
        left: 50%;
        top: 12px;
        transform: translateX(-50%);
        background: rgba(120, 20, 20, 0.85);
        border: 1px solid #ff6b6b;
        border-radius: 6px;
        padding: 6px 12px;
        display: none;
      }
      #upgrade-choices {
        position: absolute;
        z-index: 4;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(560px, calc(100vw - 32px));
        padding: 18px;
        box-sizing: border-box;
        border: 1px solid #7789aa;
        border-radius: 12px;
        background: rgba(11, 16, 25, 0.96);
        box-shadow: 0 14px 50px rgba(0, 0, 0, 0.55);
      }
      #upgrade-choices[hidden] {
        display: none;
      }
      #pause-notice {
        position: absolute;
        z-index: 3;
        left: 50%;
        top: 50%;
        width: min(280px, calc(100vw - 32px));
        box-sizing: border-box;
        padding: 14px 18px;
        transform: translate(-50%, -50%);
        color: #e9f5ff;
        text-align: center;
        background: rgba(15, 29, 45, 0.94);
        border: 1px solid #75a9d5;
        border-radius: 10px;
        box-shadow: 0 12px 38px rgba(0, 0, 0, 0.46);
        font: 13px/1.35 system-ui, sans-serif;
        pointer-events: none;
        user-select: none;
      }
      #pause-notice[hidden] { display: none; }
      #pause-notice strong, #pause-notice span { display: block; }
      #pause-notice strong { font-size: 18px; }
      #pause-notice span { margin-top: 4px; color: #c8ddec; }
      #upgrade-choices h2 {
        margin: 0 0 12px;
        text-align: center;
        font: 600 17px/1.3 system-ui, sans-serif;
      }
      #upgrade-choices .upgrade-shortcuts {
        margin: -5px 0 10px;
        color: #a8cdea;
        text-align: center;
        font: 600 12px/1.3 system-ui, sans-serif;
      }
      #upgrade-choices button {
        display: block;
        width: 100%;
        margin-top: 8px;
        padding: 12px;
        color: #eef5ff;
        background: #26354d;
        border: 1px solid #57709a;
        border-radius: 8px;
        font: 600 14px/1.2 system-ui, sans-serif;
        cursor: pointer;
      }
      #upgrade-choices button strong,
      #upgrade-choices button small,
      #upgrade-choices button span {
        display: block;
      }
      #upgrade-choices button small {
        margin-top: 3px;
        color: #8db8e5;
        font-weight: 600;
      }
      #upgrade-choices button span {
        margin-top: 5px;
        color: #c3d1e4;
        font-weight: 400;
        line-height: 1.35;
      }
      #upgrade-choices button em {
        display: block;
        margin-top: 7px;
        color: #f0cd78;
        font-size: 12px;
        font-style: normal;
      }
      #upgrade-choices button:focus-visible {
        outline: 3px solid #d7edff;
        outline-offset: 3px;
        background: #35527a;
      }
      #run-outcome {
        z-index: 5;
        top: 50%;
        width: min(360px, calc(100vw - 32px));
        box-sizing: border-box;
        padding: 16px 18px;
        transform: translate(-50%, -50%);
        text-align: center;
        font: 700 16px/1.3 system-ui, sans-serif;
        background: rgba(20, 70, 45, 0.92);
        border-color: #78d9a6;
      }
      #run-outcome[hidden] {
        display: none;
      }
      #run-outcome:not([hidden]) { display: block; }
      #run-outcome[data-outcome="defeat"] {
        background: rgba(111, 28, 28, 0.94);
        border-color: #ff7777;
      }
      #run-outcome strong, #run-outcome span { display: block; }
      #run-outcome span { margin-top: 3px; font-size: 13px; font-weight: 500; }
      #run-outcome button {
        min-height: 44px;
        margin-top: 12px;
        padding: 8px 16px;
        color: #f4fbff;
        background: #2d5f47;
        border: 1px solid #a3e6c3;
        border-radius: 6px;
        font: 700 13px/1 system-ui, sans-serif;
        cursor: pointer;
      }
      #run-outcome[data-outcome="defeat"] button {
        background: #732f34;
        border-color: #ff9e9e;
      }
      #run-outcome button:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 3px;
      }
      #director-notice {
        top: 58px;
        z-index: 3;
        min-width: min(360px, calc(100vw - 32px));
        text-align: center;
        background: rgba(25, 38, 58, 0.92);
        border-color: #7397c9;
        font: 13px/1.3 system-ui, sans-serif;
      }
      #director-notice[hidden] { display: none; }
      #director-notice:not([hidden]) { display: block; }
      #director-notice strong, #director-notice span { display: block; }
      #director-notice strong { font-size: 16px; }
      #director-notice[data-tone="warning"] { background: rgba(104, 72, 14, 0.94); border-color: #f4c05d; }
      #director-notice[data-tone="danger"] { background: rgba(111, 28, 28, 0.94); border-color: #ff7777; }
      #trait-callout {
        position: absolute;
        z-index: 3;
        left: 50%;
        top: 108px;
        width: min(360px, calc(100vw - 32px));
        padding: 8px 12px;
        box-sizing: border-box;
        transform: translateX(-50%);
        color: #eaf6ff;
        text-align: center;
        background: rgba(18, 35, 50, 0.9);
        border: 1px solid #6db7e4;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.34);
        font: 13px/1.3 system-ui, sans-serif;
        pointer-events: none;
        user-select: none;
      }
      #trait-callout[hidden] { display: none; }
      #trait-callout strong, #trait-callout span { display: block; }
      #trait-callout strong { font-size: 14px; }
      #trait-callout span { margin-top: 2px; color: #c8e3f4; }
      #trait-callout[data-tone="gather"] { background: rgba(13, 57, 74, 0.92); border-color: #62cfe9; }
      #trait-callout[data-tone="knockback"] { background: rgba(91, 37, 16, 0.92); border-color: #ff9a58; }
      #trait-callout[data-tone="mythic"] { background: rgba(61, 29, 82, 0.93); border-color: #e390ff; }
      #boss-health {
        position: absolute;
        z-index: 3;
        top: 166px;
        left: 50%;
        width: min(390px, calc(100vw - 32px));
        box-sizing: border-box;
        transform: translateX(-50%);
        padding: 8px 10px;
        color: #f5eaff;
        background: rgba(47, 22, 65, 0.92);
        border: 1px solid #d985ff;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.34);
        font: 13px/1.25 system-ui, sans-serif;
        pointer-events: none;
        user-select: none;
      }
      #boss-health[hidden] { display: none; }
      #boss-health header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      #boss-health strong { font-size: 14px; }
      #boss-health span { color: #ead6f8; font-variant-numeric: tabular-nums; }
      #boss-health-bar {
        height: 9px;
        margin-top: 6px;
        overflow: hidden;
        background: rgba(8, 7, 13, 0.72);
        border: 1px solid rgba(239, 192, 255, 0.48);
        border-radius: 999px;
      }
      #boss-health-fill {
        width: 100%;
        height: 100%;
        transform: scaleX(1);
        transform-origin: left center;
        background: linear-gradient(90deg, #df6aff, #ffa4ef);
        transition: transform 120ms linear;
      }
      /* Keyboard/mouse play already has a visible movement reminder. Hide the
         touch-only zone there so it does not cover useful arena space. */
      @media (min-width: 601px) and (hover: hover) and (pointer: fine) {
        #joystick { display: none; }
      }
      @media (max-width: 600px) {
        #hud {
          right: 8px;
          max-width: none;
          font-size: 10px;
          white-space: pre-wrap;
        }
        #controls {
          top: 118px;
          left: 8px;
          right: 8px;
          max-width: none;
          justify-content: flex-start;
        }
        #controls button {
          padding: 5px 7px;
        }
        #adaptations {
          right: 8px;
          bottom: 8px;
          width: min(236px, calc(100vw - 24px));
        }
        #adaptations .adaptation-card {
          padding: 6px 7px;
          font-size: 11px;
        }
        #trait-callout {
          top: 166px;
          font-size: 12px;
        }
        #boss-health {
          top: 218px;
          width: min(340px, calc(100vw - 24px));
          font-size: 12px;
        }
        #joystick {
          width: 42vw;
          height: 42vw;
        }
        #run-intro .run-intro-card { padding: 18px; }
        #run-intro h1 { font-size: 23px; }
      }
      /* Keep the persistent build cards out of the movement thumb's path. */
      @media (max-width: 600px) and (orientation: portrait) {
        #adaptations {
          bottom: calc(42vw + 28px);
        }
      }
      @media (max-width: 600px) and (orientation: landscape) {
        #adaptations {
          right: 8px;
          bottom: 8px;
          left: calc(42vw + 28px);
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-surface" tabindex="-1" aria-label="Game arena">
        <canvas id="game-canvas"></canvas>
        <div id="joystick"><span id="joystick-thumb" aria-hidden="true"></span></div>
      </div>
      <pre id="hud"></pre>
      <aside id="adaptations" aria-label="Active adaptations" aria-live="polite" hidden></aside>
      <div id="controls"></div>
      <section id="pause-notice" role="status" aria-live="polite" hidden></section>
      <section id="upgrade-choices" aria-live="polite" aria-labelledby="upgrade-choices-heading" aria-describedby="upgrade-choices-shortcuts" hidden></section>
      <div id="director-notice" class="banner" role="status" aria-live="polite" hidden></div>
      <div id="trait-callout" aria-hidden="true" hidden></div>
      <section id="boss-health" aria-label="Boss health" hidden>
        <header><strong id="boss-health-title">The Final Threat</strong><span id="boss-health-text"></span></header>
        <div id="boss-health-bar" role="progressbar" aria-labelledby="boss-health-title" aria-valuemin="0" aria-valuemax="100">
          <div id="boss-health-fill"></div>
        </div>
      </section>
      <div id="run-outcome" class="banner" role="status" hidden></div>
      <div id="ctx-banner" class="banner">WebGL context lost — simulation paused, restoring…</div>
    </div>
    <section id="run-intro" role="dialog" aria-modal="true" aria-labelledby="run-intro-heading" aria-describedby="run-intro-objective run-intro-controls" hidden>
      <div class="run-intro-card">
        <p id="run-intro-eyebrow" class="run-intro-eyebrow"></p>
        <h1 id="run-intro-heading"></h1>
        <p id="run-intro-objective"></p>
        <p id="run-intro-controls"></p>
        <label id="run-intro-sound" class="run-intro-sound">
          <input id="run-intro-sound-toggle" type="checkbox" aria-label="Sound effects" aria-describedby="run-intro-sound-help" />
          <span>Sound effects</span>
          <small id="run-intro-sound-help">Off by default. Change anytime.</small>
        </label>
        <p id="run-intro-sound-status" class="sound-status" role="status" hidden></p>
        <button id="run-intro-start" type="button"></button>
      </div>
    </section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
