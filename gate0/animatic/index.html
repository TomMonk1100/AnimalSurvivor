<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Gate 0 Gameplay Animatic</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #0b1020; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle, #243255, #0b1020 70%); }
      main { width: min(1120px, 96vw); }
      .frame { --storyboard: url("../../assets/concepts/gate0-gameplay-storyboard.png"); position: relative; overflow: hidden; width: 100%; aspect-ratio: 16 / 9; border-radius: 24px; box-shadow: 0 32px 90px #000b; background: #17213a; }
      .panel { position: absolute; inset: 0; background-image: var(--storyboard); background-repeat: no-repeat; background-size: 200% 200%; opacity: 0; animation: sequence 15s linear infinite; transform: scale(1.015); }
      .p1 { background-position: left top; animation-delay: 0s; }
      .p2 { background-position: right top; animation-delay: 3.75s; }
      .p3 { background-position: left bottom; animation-delay: 7.5s; }
      .p4 { background-position: right bottom; animation-delay: 11.25s; }
      .progress { position: absolute; z-index: 5; left: 3%; right: 3%; bottom: 3%; height: 7px; border-radius: 999px; overflow: hidden; background: #ffffff40; }
      .progress::after { content: ""; display: block; width: 100%; height: 100%; background: #ffcf69; transform-origin: left; animation: progress 15s linear infinite; }
      .badge { position: absolute; z-index: 5; top: 3%; left: 3%; padding: 9px 13px; color: white; background: #101629cc; border: 1px solid #ffffff38; border-radius: 999px; font-weight: 800; letter-spacing: .08em; font-size: clamp(.65rem, 1.5vw, .9rem); }
      @keyframes sequence {
        0%, 21% { opacity: 1; transform: scale(1.015); }
        25%, 96% { opacity: 0; transform: scale(1.055); }
        100% { opacity: 1; transform: scale(1.015); }
      }
      @keyframes progress { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      @media (prefers-reduced-motion: reduce) { .panel, .progress::after { animation-play-state: paused; } .p1 { opacity: 1; } }
    </style>
  </head>
  <body>
    <main>
      <div class="frame" aria-label="Fifteen-second concept animatic: a fox dodges a swarm, gains quills, fires automatically, and evolves for a boss fight">
        <div class="panel p1"></div>
        <div class="panel p2"></div>
        <div class="panel p3"></div>
        <div class="panel p4"></div>
        <div class="badge">CONCEPT GAMEPLAY</div>
        <div class="progress"></div>
      </div>
    </main>
    <script>
      const condition = new URLSearchParams(window.location.search).get("condition");
      if (condition === "stat") {
        document.querySelector(".frame").style.setProperty(
          "--storyboard",
          'url("../../assets/concepts/gate0-gameplay-storyboard-stat-only.png")'
        );
      }
    </script>
  </body>
</html>
